name: Snapshot

# ── Triggers ────────────────────────────────────────────────────────────────
# • push to main   → full pipeline (CI + Docker snapshot + snapshot release)
# • pull_request   → CI only (fmt / clippy / test)
# • workflow_dispatch → full pipeline (manual)
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.cli'
      - 'docker/**'
      - '.github/workflows/snapshot.yml'

  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write   # create/update snapshot release
  id-token: write   # SLSA provenance attestation

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  IMAGE_NAME: nexalang/nexa

# ─────────────────────────────────────────────────────────────────────────────
# CI — runs on every trigger (PRs + main push)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - run: cargo clippy --all -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - run: cargo build --all
      - run: cargo test --all

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Runs in parallel with the other CI jobs; does NOT block the pipeline.
    # A coverage drop surfaces as a warning in the PR check, not a failure.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run coverage
        run: |
          cargo tarpaulin \
            --all \
            --timeout 120 \
            --out Xml \
            --output-dir coverage/
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
          retention-days: 7
      - name: Publish to Codecov (optional)
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# Docker snapshot — main push + workflow_dispatch only
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker · snapshot
    needs: [fmt, clippy, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=snapshot
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Nexa CLI
            org.opencontainers.image.description=Official CLI for the Nexa language — build, run, and publish Nexa projects
            org.opencontainers.image.vendor=Nexa Language Organization
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./docker/hub-readme.md
          short-description: Official CLI for the Nexa language — build, run, and publish Nexa projects

# ─────────────────────────────────────────────────────────────────────────────
# Binary build — main push + workflow_dispatch only
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.asset }}
    needs: [fmt, clippy, test]
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: nexa-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: nexa-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: nexa-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: nexa-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: nexa-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: snapshot-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: snapshot-${{ matrix.target }}-

      - name: Build
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PKG_VERSION=$(grep -m1 '^version = ' crates/cli/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          export NEXA_RELEASE_VERSION="${PKG_VERSION}-snapshot.${SHORT_SHA}"
          cargo build --release --locked --bin nexa --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/nexa"
          ARCHIVE="${{ matrix.asset }}.tar.gz"
          strip "$BIN" 2>/dev/null || true
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "ASSET=$ARCHIVE"           >> "$GITHUB_ENV"
          echo "CHECKSUM=$ARCHIVE.sha256" >> "$GITHUB_ENV"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin     = "target/${{ matrix.target }}/release/nexa.exe"
          $archive = "${{ matrix.asset }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Set-Content "$archive.sha256"
          "ASSET=$archive"           | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM=$archive.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
          retention-days: 1
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# Rolling snapshot release — main push + workflow_dispatch only
# ─────────────────────────────────────────────────────────────────────────────
  snapshot-release:
    name: Publish snapshot release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: find artifacts -type f | sort

      - name: Write release notes
        run: |
          SHORT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          printf "## Development Snapshot\n\n" > notes.md
          printf "Built from \`main\` at **%s** (%.7s).\n\n" "$BUILD_DATE" "$SHORT_SHA" >> notes.md
          printf "This is an **unstable pre-release**. For production use the stable channel.\n\n" >> notes.md
          printf "**Install snapshot:**\n\`\`\`sh\n" >> notes.md
          printf "curl --proto '=https' --tlsv1.2 -sSf \\\\\n" >> notes.md
          printf "  https://raw.githubusercontent.com/nexa-lang-org/nexa-lang/main/setup.sh \\\\\n" >> notes.md
          printf "  | sh -s -- --channel snapshot\n\`\`\`\n" >> notes.md

      - name: Delete existing snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_PRE=$(gh release view snapshot --json isPrerelease -q '.isPrerelease' 2>/dev/null || echo "false")
          if [ "$IS_PRE" = "true" ]; then
            gh release delete snapshot --yes --cleanup-tag
          else
            echo "No existing snapshot release to delete."
          fi

      - name: Create snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh release create snapshot \
            --title "Snapshot – ${BUILD_DATE} (${SHORT_SHA:0:7})" \
            --notes-file notes.md \
            --prerelease

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload snapshot artifacts/*
