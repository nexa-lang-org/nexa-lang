name: Deploy Registry

# ── Triggers ────────────────────────────────────────────────────────────────
# • push to main (registry crate or infra files changed)
# • workflow_dispatch (manual)
on:
  push:
    branches: [main]
    paths:
      - 'crates/registry/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - '.github/workflows/deploy-registry.yml'

  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to ghcr.io

env:
  IMAGE_NAME: ghcr.io/nexa-lang-org/nexa-registry

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Build & push the registry image to ghcr.io
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build & push registry image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/registry/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — SSH into the VPS and deploy the new image
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify SSH secrets
        run: |
          missing=()
          [ -z "${{ secrets.VPS_HOST }}"    ] && missing+=("VPS_HOST")
          [ -z "${{ secrets.VPS_USER }}"    ] && missing+=("VPS_USER")
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]} — set them in Settings → Secrets → Actions"
            exit 1
          fi
          echo "All SSH secrets present."

      - name: Copy compose + nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          source:   "docker-compose.prod.yml,nginx/"
          target:   "/opt/nexa-registry"

      - name: Pull new image and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/nexa-registry

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u nexa-lang-org --password-stdin

            docker compose -f docker-compose.prod.yml pull registry
            docker compose -f docker-compose.prod.yml up -d --no-deps registry
            docker image prune -f

            # I03: wait for the registry to accept requests before reporting success.
            echo "Waiting for registry health-check…"
            for i in $(seq 1 15); do
              if curl -sf http://localhost:4000/health > /dev/null; then
                echo "Registry healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "::error::Registry did not become healthy within 15s"
                exit 1
              fi
              sleep 1
            done

            echo "Deploy complete — $(date -u '+%Y-%m-%d %H:%M UTC')"
