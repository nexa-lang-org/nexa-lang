# Nexa Registry — Nginx configuration
# Handles: HTTP→HTTPS redirect, ACME challenge, TLS termination, reverse proxy

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name registry.nexa-lang.org;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name registry.nexa-lang.org;

    # TLS certificates (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/registry.nexa-lang.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.nexa-lang.org/privkey.pem;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-Frame-Options           DENY                                            always;

    # Allow large .nexa bundle uploads (up to 256 MB)
    client_max_body_size 256M;

    # Proxy to the registry container
    location / {
        proxy_pass         http://registry:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
