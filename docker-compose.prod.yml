# Production docker-compose — used on the VPS.
# Secrets are loaded from .env (never commit that file).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       nexa_registry
      POSTGRES_USER:     nexa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexa -d nexa_registry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Registry API ────────────────────────────────────────────────────────────
  registry:
    image: ghcr.io/na2sime/nexa-registry:latest
    environment:
      DATABASE_URL: postgres://nexa:${DB_PASSWORD}@db:5432/nexa_registry
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Only reachable from inside the Docker network (Nginx proxies it)
    expose:
      - "4000"

  # ── Nginx (TLS termination + reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/registry.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - registry
    restart: unless-stopped

  # ── Certbot (auto-renew Let's Encrypt every 12 h) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

volumes:
  pg_data:
  letsencrypt:
  certbot_www:
